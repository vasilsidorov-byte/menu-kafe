<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Адмінка — Навчальне кафе</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

:root{--green:#1a7a3c;--green-light:#e8f5ee;--orange:#f5a623;--orange-light:#fff8ed;--red:#d93025;--red-light:#fce8e6;--blue:#1a6fa8;--blue-light:#e8f2fa;--text:#1e2a1e;--muted:#6b7c6b;--bg:#f0f4f0;--white:#fff;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}.btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}.btn-full{width:100%}.btn:hover{opacity:.88}
.input{width:100%;padding:12px 14px;border:1.5px solid #dde8dd;border-radius:10px;font-family:inherit;font-size:15px;outline:none;color:var(--text);background:#fff}
.input:focus{border-color:var(--green)}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--orange)}
.header-text{flex:1}.header-text h1{font-size:15px;font-weight:800;color:var(--green)}.header-text p{font-size:11px;color:var(--muted)}
.page{display:none}.page.active{display:block}
.container{max-width:560px;margin:0 auto;padding:16px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center}
.login-card img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--orange);margin-bottom:16px}
.login-card h2{font-size:20px;font-weight:800;color:var(--green);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:24px}
.err{color:var(--red);font-size:13px;margin-top:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.3s}
.tslider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.tslider{background:var(--green)}
.toggle input:checked+.tslider:before{transform:translateX(20px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:24px 20px 32px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns .btn{flex:1}
.photo-area{width:100%;height:130px;border-radius:10px;border:1.5px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;overflow:hidden;background:#fafafa}
.photo-area img{width:100%;height:100%;object-fit:cover}

.tabs{display:flex;background:#fff;border-bottom:2px solid #e8eee8;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:12px 8px;font-family:inherit;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tc{display:none;padding:16px}.tc.active{display:block}
.cat-block{background:#fff;border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0f4f0}
.cat-hdr-title{flex:1;font-size:15px;font-weight:800}
.dish-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f7f9f7}
.dish-row:last-child{border-bottom:none}
.dish-thumb{width:44px;height:44px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.dish-thumb img{width:100%;height:100%;object-fit:cover}
.dish-ri{flex:1;min-width:0}
.dish-rn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dish-rp{font-size:12px;color:var(--green);font-weight:700;margin-top:2px}
.add-cat-row{padding:12px 14px;display:flex;gap:8px}
.user-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #f0f4f0}
.user-row:last-child{border-bottom:none}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.history-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.history-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green)}
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <img id="login-logo" alt="">
    <h2>Адміністратор</h2><p>Навчальне кафе коледжу</p>
    <input class="input" type="password" id="pwd" placeholder="Введіть пароль" style="margin-bottom:12px">
    <button class="btn btn-green btn-full" onclick="doLogin()">Увійти</button>
    <p class="err" id="lerr"></p>
  </div>
</div>
<div style="display:none" id="app-screen">
  <div class="header">
    <img id="app-logo" alt="">
    <div class="header-text"><h1>Адмінка кафе</h1><p>Управління меню</p></div>
    <button class="btn btn-sm btn-outline" onclick="doLogout()" style="margin-left:auto">Вийти</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('obidy',this)">🥗 Обіди</button>
    <button class="tab" onclick="switchTab('kafeteriy',this)">☕ Кафетерій</button>
    <button class="tab" onclick="switchTab('users',this)">👤 Офіціанти</button>
    <button class="tab" onclick="switchTab('history',this)">📋 Історія</button>
  </div>
  <div class="tc active" id="tc-obidy"></div>
  <div class="tc" id="tc-kafeteriy"></div>
  <div class="tc" id="tc-users"></div>
  <div class="tc" id="tc-history"></div>
</div>
<div class="save-toast" id="toast">Збережено ✓</div>
<div class="modal-overlay hidden" id="dish-modal">
  <div class="modal">
    <h3 id="modal-title">Додати страву</h3>
    <div class="field"><label>Назва страви</label><input class="input" id="f-name" placeholder="Наприклад: Борщ"></div>
    <div class="field"><label>Опис (необов'язково)</label><input class="input" id="f-desc" placeholder="Інгредієнти, вага..."></div>
    <div class="field"><label>Ціна (грн)</label><input class="input" id="f-price" type="number" placeholder="0"></div>
    <div class="field">
      <label>Фото страви</label>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('f-photo').click()">
        <span id="photo-ph">Натисніть, щоб додати фото</span>
        <img id="photo-thumb" style="display:none">
      </div>
      <input type="file" id="f-photo" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-green" onclick="saveDish()">Зберегти</button>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="pwd-modal">
  <div class="modal">
    <h3 id="pwd-modal-title">Змінити пароль</h3>
    <div class="field"><label>Новий пароль</label><input class="input" id="new-pwd" type="password" placeholder="Мінімум 6 символів"></div>
    <div class="field"><label>Повторіть пароль</label><input class="input" id="new-pwd2" type="password" placeholder="Повторіть пароль"></div>
    <p class="err" id="pwd-err"></p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closePwdModal()">Скасувати</button>
      <button class="btn btn-green" onclick="savePassword()">Зберегти</button>
    </div>
  </div>
</div>

const DEFAULT_MENU = {
  obidy:{categories:[{id:"salaty",name:"Салати",icon:"🥗"},{id:"pershi",name:"Перші страви",icon:"🍲"},{id:"osnovni",name:"Основні страви",icon:"🍽️"}],dishes:[]},
  kafeteriy:{categories:[{id:"napoi",name:"Напої",icon:"☕"},{id:"vypichka",name:"Випічка",icon:"🥐"},{id:"zakusky",name:"Закуски",icon:"🥪"}],dishes:[]}
};
const DEFAULT_USERS = {
  admin:{password:"Aa123456",role:"admin"},
  waiter1:{password:"W123456",role:"waiter",name:"Офіціант 1"},
  waiter2:{password:"W234567",role:"waiter",name:"Офіціант 2"},
  waiter3:{password:"W345678",role:"waiter",name:"Офіціант 3"},
};

document.getElementById("login-logo").src=LOGO_SRC;
document.getElementById("app-logo").src=LOGO_SRC;

let menuData={};
let usersData={};
let ordersData={};

async function initDB(){
  const usersSnap = await get(ref(db,"cafe/users"));
  if(!usersSnap.exists()){
    await set(ref(db,"cafe/users"), DEFAULT_USERS);
  }
  const menuSnap = await get(ref(db,"cafe/menu"));
  if(!menuSnap.exists()){
    await set(ref(db,"cafe/menu"), DEFAULT_MENU);
  }
}

onValue(ref(db,"cafe/menu"),snap=>{menuData=snap.val()||{};renderAll();});
onValue(ref(db,"cafe/users"),snap=>{usersData=snap.val()||{};renderUsers();});
onValue(ref(db,"cafe/orders"),snap=>{ordersData=snap.val()||{};});

const ADMIN_SESSION_KEY="cafe_admin_session";

function saveAdminSession(){
  localStorage.setItem(ADMIN_SESSION_KEY,JSON.stringify({expires:Date.now()+60*60*1000}));
}
function loadAdminSession(){
  try{
    const s=JSON.parse(localStorage.getItem(ADMIN_SESSION_KEY));
    if(s&&s.expires>Date.now())return true;
    localStorage.removeItem(ADMIN_SESSION_KEY);
  }catch{}
  return false;
}
function clearAdminSession(){localStorage.removeItem(ADMIN_SESSION_KEY);}

function startAdminApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app-screen").style.display="block";
  renderAll();
}

// Auto-login if session valid
if(loadAdminSession()){
  initDB().then(()=>startAdminApp());
}

document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

window.doLogin=async function(){
  await initDB();
  const snap=await get(ref(db,"cafe/users/admin"));
  const u=snap.val();
  const v=document.getElementById("pwd").value;
  if(u&&v===u.password){
    saveAdminSession();
    startAdminApp();
  }else{document.getElementById("lerr").textContent="Невірний пароль";}
};
window.doLogout=function(){
  clearAdminSession();
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app-screen").style.display="none";
  document.getElementById("pwd").value="";
};

function showToast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}

function renderAll(){renderTab("obidy");renderTab("kafeteriy");}

function renderTab(sid){
  const sec=menuData[sid];
  const el=document.getElementById("tc-"+sid);
  if(!sec||!el)return;
  const cats=Object.values(sec.categories||{});
  const dishes=Object.values(sec.dishes||{});
  let html='<div style="padding-top:4px">';
  cats.forEach(cat=>{
    const catDishes=dishes.filter(d=>d.category===cat.id);
    html+=`<div class="cat-block">
      <div class="cat-hdr">
        <span style="font-size:20px">${cat.icon}</span>
        <span class="cat-hdr-title">${cat.name}</span>
        <button class="btn btn-orange btn-sm" onclick="openAddDish('${sid}','${cat.id}')">+ Страва</button>
        <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteCat('${sid}','${cat.id}')">✕</button>
      </div>`;
    catDishes.forEach(d=>{
      const thumb=d.photo?`<div class="dish-thumb"><img src="${d.photo}"></div>`:`<div class="dish-thumb">${cat.icon}</div>`;
      html+=`<div class="dish-row">
        ${thumb}
        <div class="dish-ri"><div class="dish-rn">${d.name}</div><div class="dish-rp">${d.price} грн</div></div>
        <label class="toggle"><input type="checkbox" ${d.active?"checked":""} onchange="toggleDish('${sid}','${d.id}',this.checked)"><span class="tslider"></span></label>
        <button class="btn btn-sm btn-outline" onclick="openEditDish('${sid}','${d.id}')">✎</button>
        <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:none" onclick="deleteDish('${sid}','${d.id}')">✕</button>
      </div>`;
    });
    if(!catDishes.length)html+=`<div style="padding:12px 14px;color:#bbb;font-size:13px;text-align:center">Немає страв</div>`;
    html+=`</div>`;
  });
  html+=`<div class="cat-block"><div class="add-cat-row">
    <input class="input" id="nc-name-${sid}" placeholder="Нова категорія" style="flex:1">
    <input class="input" id="nc-icon-${sid}" placeholder="🍴" style="width:58px;text-align:center">
    <button class="btn btn-green btn-sm" onclick="addCat('${sid}')">Додати</button>
  </div></div>`;
  html+='</div>';
  el.innerHTML=html;
}

function renderUsers(){
  const el=document.getElementById("tc-users");if(!el)return;
  let html='<div class="cat-block">';
  ["waiter1","waiter2","waiter3"].forEach(k=>{
    const u=usersData[k];if(!u)return;
    html+=`<div class="user-row">
      <div class="user-avatar">👤</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:800">${u.name}</div><div style="font-size:12px;color:var(--muted)">Логін: ${k}</div></div>
      <button class="btn btn-sm btn-outline" onclick="openPwdModal('${k}')">Змінити пароль</button>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function renderHistory(){
  const el=document.getElementById("tc-history");if(!el)return;
  const orders=Object.values(ordersData||{}).filter(o=>o.status==="closed").reverse();
  if(!orders.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#bbb">Замовлень ще немає</div>';return;}
  let html="";
  orders.forEach(o=>{
    const dt=new Date(o.createdAt);
    const time=dt.toLocaleString("uk-UA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    const total=o.items.reduce((s,i)=>s+parseFloat(i.price)*i.qty,0);
    html+=`<div class="history-item">
      <div class="history-hdr"><span style="font-weight:800">Стіл №${o.table}</span><span class="badge badge-green">Виконано</span></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${time} · ${o.waiterName}</div>`;
    o.items.forEach(i=>{html+=`<div style="font-size:13px;display:flex;justify-content:space-between;padding:3px 0"><span>${i.name} × ${i.qty}</span><span style="font-weight:700">${(parseFloat(i.price)*i.qty).toFixed(2)} грн</span></div>`;});
    html+=`<div style="border-top:1px solid #eee;margin-top:8px;padding-top:8px;font-weight:800;display:flex;justify-content:space-between"><span>Разом</span><span>${total.toFixed(2)} грн</span></div></div>`;
  });
  el.innerHTML=html;
}

window.switchTab=function(sid,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tc").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tc-"+sid).classList.add("active");
  if(sid==="history")renderHistory();
  if(sid==="users")renderUsers();
};

window.addCat=async function(sid){
  const name=document.getElementById("nc-name-"+sid).value.trim();
  const icon=document.getElementById("nc-icon-"+sid).value.trim()||"🍴";
  if(!name)return;
  const id="cat_"+Date.now();
  await set(ref(db,`cafe/menu/${sid}/categories/${id}`),{id,name,icon});
  document.getElementById("nc-name-"+sid).value="";
  document.getElementById("nc-icon-"+sid).value="";
  showToast();
};
window.deleteCat=async function(sid,catId){
  if(!confirm("Видалити категорію і всі страви?"))return;
  await remove(ref(db,`cafe/menu/${sid}/categories/${catId}`));
  const dishes=Object.values(menuData[sid]?.dishes||{}).filter(d=>d.category===catId);
  for(const d of dishes) await remove(ref(db,`cafe/menu/${sid}/dishes/${d.id}`));
  showToast();
};
window.toggleDish=async function(sid,dishId,val){
  await set(ref(db,`cafe/menu/${sid}/dishes/${dishId}/active`),val);
  showToast();
};
window.deleteDish=async function(sid,dishId){
  if(!confirm("Видалити страву?"))return;
  await remove(ref(db,`cafe/menu/${sid}/dishes/${dishId}`));
  showToast();
};

let _sid="",_catId="",_dishId="",_photo="";
window.openAddDish=function(sid,catId){
  _sid=sid;_catId=catId;_dishId="";_photo="";
  document.getElementById("modal-title").textContent="Додати страву";
  document.getElementById("f-name").value="";
  document.getElementById("f-desc").value="";
  document.getElementById("f-price").value="";
  document.getElementById("photo-thumb").style.display="none";
  document.getElementById("photo-ph").style.display="";
  document.getElementById("dish-modal").classList.remove("hidden");
};
window.openEditDish=function(sid,dishId){
  const sec=menuData[sid];
  const d=sec?.dishes?.[dishId];
  if(!d)return;
  _sid=sid;_catId=d.category;_dishId=dishId;_photo=d.photo||"";
  document.getElementById("modal-title").textContent="Редагувати страву";
  document.getElementById("f-name").value=d.name;
  document.getElementById("f-desc").value=d.desc||"";
  document.getElementById("f-price").value=d.price;
  if(d.photo){document.getElementById("photo-thumb").src=d.photo;document.getElementById("photo-thumb").style.display="block";document.getElementById("photo-ph").style.display="none";}
  else{document.getElementById("photo-thumb").style.display="none";document.getElementById("photo-ph").style.display="";}
  document.getElementById("dish-modal").classList.remove("hidden");
};
window.closeModal=function(){document.getElementById("dish-modal").classList.add("hidden");};
window.handlePhoto=function(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{_photo=e.target.result;document.getElementById("photo-thumb").src=_photo;document.getElementById("photo-thumb").style.display="block";document.getElementById("photo-ph").style.display="none";};
  r.readAsDataURL(file);
};
window.saveDish=async function(){
  const name=document.getElementById("f-name").value.trim();
  const price=document.getElementById("f-price").value.trim();
  const desc=document.getElementById("f-desc").value.trim();
  if(!name||!price)return;
  const id=_dishId||"dish_"+Date.now();
  await set(ref(db,`cafe/menu/${_sid}/dishes/${id}`),{id,category:_catId,name,desc,price,photo:_photo,active:true});
  closeModal();showToast();
};

let _pwdUser="";
window.openPwdModal=function(k){
  _pwdUser=k;
  document.getElementById("pwd-modal-title").textContent="Змінити пароль — "+(usersData[k]?.name||k);
  document.getElementById("new-pwd").value="";
  document.getElementById("new-pwd2").value="";
  document.getElementById("pwd-err").textContent="";
  document.getElementById("pwd-modal").classList.remove("hidden");
};
window.closePwdModal=function(){document.getElementById("pwd-modal").classList.add("hidden");};
window.savePassword=async function(){
  const p1=document.getElementById("new-pwd").value;
  const p2=document.getElementById("new-pwd2").value;
  if(p1.length<6){document.getElementById("pwd-err").textContent="Мінімум 6 символів";return;}
  if(p1!==p2){document.getElementById("pwd-err").textContent="Паролі не співпадають";return;}
  await set(ref(db,`cafe/users/${_pwdUser}/password`),p1);
  closePwdModal();showToast();
};
</script>
